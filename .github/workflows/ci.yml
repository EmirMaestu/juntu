name: build
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-react/package-lock.json
      # npm install (no ci): el lockfile puede no traer las variantes nativas de
      # otra plataforma (ej. @emnapi para Linux) y npm ci falla por eso en el runner.
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: python -m pip install -r vps_current/requirements.txt
      - run: python -m compileall -q vps_current
      - run: cd vps_current && python -m pytest -q
